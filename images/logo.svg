<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16"/>
      <stop offset="50%" stop-color="#120e26"/>
      <stop offset="100%" stop-color="#05050a"/>
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradients for Core and Lines -->
    <linearGradient id="cyberCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <linearGradient id="matrixMagenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0844"/>
      <stop offset="100%" stop-color="#ffb199"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Cybernetic Grid Pattern (Subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M0,80 H1200 M0,160 H1200 M0,240 H1200 M0,320 H1200" />
    <path d="M200,0 V400 M400,0 V400 M600,0 V400 M800,0 V400 M1000,0 V400" />
  </g>

  <!-- Ambient Glowing Orbs -->
  <circle cx="1000" cy="200" r="140" fill="#4facfe" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="950" cy="120" r="80" fill="#ff0844" opacity="0.08" filter="url(#softGlow)"/>

  <!-- AI Neural Network Node Graph (Right Side Illustration) -->
  <g transform="translate(880, 200)">
    <!-- Connection Lines -->
    <g stroke="#4facfe" stroke-opacity="0.4" stroke-width="1.5">
      <line x1="0" y1="0" x2="-80" y2="-70" />
      <line x1="0" y1="0" x2="-90" y2="40" />
      <line x1="0" y1="0" x2="70" y2="-90" />
      <line x1="0" y1="0" x2="80" y2="60" />
      <line x1="-80" y1="-70" x2="-140" y2="-20" />
      <line x1="-90" y1="40" x2="-150" y2="90" />
      <line x1="70" y1="-90" x2="130" y2="-30" />
      <line x1="80" y1="60" x2="140" y2="20" />
      <line x1="-80" y1="-70" x2="-20" y2="-120" />
      <line x1="70" y1="-90" x2="20" y2="-130" />
    </g>

    <!-- Outer Orbit Rings -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#ff0844" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="6, 6"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#00f2fe" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="12, 8, 4, 8"/>

    <!-- Peripheral Nodes -->
    <circle cx="-80" cy="-70" r="5" fill="#4facfe" filter="url(#neonGlow)"/>
    <circle cx="-90" cy="40" r="4" fill="#ff0844" filter="url(#neonGlow)"/>
    <circle cx="70" cy="-90" r="6" fill="#00f2fe" filter="url(#neonGlow)"/>
    <circle cx="80" cy="60" r="5" fill="#ff0844" filter="url(#neonGlow)"/>
    <circle cx="-140" cy="-20" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="-150" cy="90" r="4" fill="#4facfe"/>
    <circle cx="130" cy="-30" r="5" fill="#ffb199"/>
    <circle cx="140" cy="20" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="-20" cy="-120" r="4" fill="#00f2fe"/>
    <circle cx="20" cy="-130" r="3" fill="#ff0844"/>

    <!-- Central Core (AI Brain / Agent Core) -->
    <circle cx="0" cy="0" r="45" fill="#0a0a16" stroke="#00f2fe" stroke-width="3" filter="url(#neonGlow)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ff0844" stroke-width="2" stroke-dasharray="4, 3"/>
    <circle cx="0" cy="0" r="12" fill="url(#cyberCyan)" filter="url(#neonGlow)"/>
  </g>

  <!-- Typography & Text Overlay (Left Side) -->
  <g transform="translate(80, 0)">
    <!-- Status Badge -->
    <g transform="translate(0, 105)">
      <rect x="0" y="0" width="165" height="28" rx="14" fill="#00f2fe" fill-opacity="0.1" stroke="#00f2fe" stroke-opacity="0.4" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#00f2fe" filter="url(#neonGlow)"/>
      <text x="28" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#00f2fe" letter-spacing="1.5">AUTONOMOUS CORE</text>
    </g>

    <!-- Main Title -->
    <text x="0" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" letter-spacing="0.5">
      PYTHON A.I. AGENT
    </text>

    <!-- Subtitle / Architecture details -->
    <text x="0" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" letter-spacing="0.5">
      Advanced ReAct Architecture <tspan fill="#ff0844" font-weight="700">•</tspan> Semantic Memory <tspan fill="#ff0844" font-weight="700">•</tspan> Live Web Research
    </text>

    <!-- Tech Stack Indicator Pills -->
    <g transform="translate(0, 260)">
      <!-- Pill 1 -->
      <rect x="0" y="0" width="110" height="32" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
      <text x="55" y="21" font-family="Consolas, Monaco, monospace" font-size="12" font-weight="600" fill="#818cf8" text-anchor="middle">Python 3.10+</text>

      <!-- Pill 2 -->
      <rect x="122" y="0" width="115" height="32" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
      <text x="1795" y="21" font-family="Consolas, Monaco, monospace" font-size="12" font-weight="600" fill="#38bdf8" text-anchor="middle">DuckDuckGo</text>
      <text x="179" y="21" font-family="Consolas, Monaco, monospace" font-size="12" font-weight="600" fill="#38bdf8" text-anchor="middle">Web Search</text>

      <!-- Pill 3 -->
      <rect x="248" y="0" width="135" height="32" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
      <text x="315" y="21" font-family="Consolas, Monaco, monospace" font-size="12" font-weight="600" fill="#f472b6" text-anchor="middle">Self-Correction</text>
    </g>
  </g>

  <!-- Bottom Accent Border Line -->
  <line x1="0" y1="397" x2="1200" y2="397" stroke="url(#cyberCyan)" stroke-width="3" opacity="0.8" filter="url(#neonGlow)"/>
</svg>
